<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聯絡資訊 - 安生診所-雙心門診</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/normalize.css">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="page">
<header class="header_area">[header]</header>
<div class="page-banner" style="background:linear-gradient(135deg,#267F39 0%,#0A4D26 100%);padding:80px 5%;text-align:center;">
  <h1 style="font-family:'Noto Serif TC',serif;font-size:42px;color:#fff;margin:0;letter-spacing:.15em;">聯絡資訊</h1>
  <p style="font-family:Arial,sans-serif;font-size:18px;color:#8EC31B;margin:10px 0 0;">CONTACT</p>
</div>
<div id="content_main">
  <section style="padding:80px 5%;">
    <div style="max-width:800px;margin:auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:30px;">
      <div style="background:#fff;border-radius:16px;padding:30px;box-shadow:0 4px 20px rgba(0,0,0,.08);text-align:center;">
        <div style="font-size:48px;margin-bottom:15px;">📍</div>
        <h3 style="font-size:20px;color:#267F39;margin:0 0 10px;">地址</h3>
        <p style="font-size:16px;color:#555;">桃園市龜山區文化二路28-5號2樓</p>
      </div>
      <div style="background:#fff;border-radius:16px;padding:30px;box-shadow:0 4px 20px rgba(0,0,0,.08);text-align:center;">
        <div style="font-size:48px;margin-bottom:15px;">📞</div>
        <h3 style="font-size:20px;color:#267F39;margin:0 0 10px;">電話</h3>
        <p style="font-size:20px;color:#333;font-weight:bold;">03-3270292</p>
      </div>
      <div style="background:#fff;border-radius:16px;padding:30px;box-shadow:0 4px 20px rgba(0,0,0,.08);text-align:center;">
        <div style="font-size:48px;margin-bottom:15px;">💬</div>
        <h3 style="font-size:20px;color:#267F39;margin:0 0 10px;">LINE</h3>
        <p style="font-size:20px;color:#267F39;font-weight:bold;">@andersonclinic</p>
      </div>
      <div style="background:#fff;border-radius:16px;padding:30px;box-shadow:0 4px 20px rgba(0,0,0,.08);text-align:center;">
        <div style="font-size:48px;margin-bottom:15px;">✉️</div>
        <h3 style="font-size:20px;color:#267F39;margin:0 0 10px;">Email</h3>
        <p style="font-size:16px;color:#555;">mkt@anderson.doctor</p>
      </div>
    </div>
  </section>
  <section style="padding:40px 5%;background:#f5f9f5;text-align:center;">
    <a href="https://line.me/ti/p/~@andersonclinic" target="_blank" style="display:inline-block;padding:15px 40px;background:#267F39;color:#fff;border-radius:50px;font-size:20px;text-decoration:none;transition:all .3s;">
      💬 LINE 專人諮詢
    </a>
  </section>
</div>
<footer class="footer with_shopping_mode">[footer]</footer>
</div>
<script src="assets/js/jquery-1.11.3.min.js"></script>
<script>$(function(){$('#to_top').on('click',function(e){e.preventDefault();$('html,body').animate({scrollTop:0},600);});});</script>
</body>
</html>
